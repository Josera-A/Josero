<!DOCTYPE html>
<html lang="hy">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ապրանքի Տեսք - Josero</title>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <!-- HEADER -->
    <header>
        <div class="header-top">
            <a href="index.html" class="logo">José<span>ro</span></a>
            <div class="mini-desc">Բարձր որակի կեր ձեր կենդանիների համար</div>
            <div class="header-actions">
                <button class="menu-toggle" onclick="toggleMenu()" aria-label="Toggle menu">☰</button>
                <nav class="header-nav" aria-label="Header navigation">
                    <ul class="header-buttons">
                        <li><a href="shun.html">Շուն</a></li>
                        <li><a href="katu.html">Կատու</a></li>
                        <li><a href="josi.html">Ջոսի</a></li>
                        <li><a href="bjshkakan.html">Օգնություն</a></li>
                    </ul>
                </nav>
            </div>
        </div>
    </header>

    <!-- PRODUCT DETAIL SECTION -->
    <main>
        <section class="product-detail-section">
            <div class="product-detail-container">
                <!-- BACK BUTTON -->
                <button id="backBtn" class="back-button">← Վերադառնալ</button>

                <!-- PRODUCT DETAIL CONTENT -->
                <div class="product-detail-content">
                    <!-- LEFT SIDE: TEXT -->
                    <div class="product-detail-text">
                        <h1 id="productName">—</h1>
                        <p id="productType" class="product-type"></p>
                        <p id="productMini" class="product-mini"></p>

                        <div class="product-description-section">
                            <h3>Նկարագրություն</h3>
                            <p id="productDesc" class="product-description"></p>
                        </div>

                        <div class="product-packaging-section">
                            <h3>Փաթեթավորում</h3>
                            <div id="productPackaging" class="packaging-badge"></div>
                        </div>
                    </div>

                    <!-- RIGHT SIDE: IMAGE -->
                    <div class="product-detail-image">
                        <img id="productImage" src="" alt="Product image" class="product-image-large">
                    </div>
                </div>
            </div>
        </section>
    </main>

    <!-- FOOTER -->
    <footer>
        <div class="footer-content">
            <div class="footer-logo">José<span>ro</span></div>
            <nav class="footer-nav">
                <ul id="navMenu">
                    <li><a href="shun.html">Շուն</a></li>
                    <li><a href="katu.html">Կատու</a></li>
                    <li><a href="josi.html">Ջոսի</a></li>
                    <li><a href="bjshkakan.html">Օգնություն</a></li>
                </ul>
            </nav>
            <div class="footer-contact">
                <p>&copy; 2026 Josero - բոլոր իրավունքները պաշտպանված են:</p>
                <p>Կապ մեզ հետ: <a href="mailto:info@josero.am" class="footer-email">info@josero.am</a></p>
            </div>
        </div>
    </footer>

    <!-- SCRIPTS -->
    <script src="js/script.js"></script>
    <script src="js/data.js"></script>
    <script src="js/product-detail.js"></script>
</body>
</html>
